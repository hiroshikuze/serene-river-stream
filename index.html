<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite River Journey</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      #ui {
        position: fixed;
        top: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        font-family: 'Courier New', monospace;
        user-select: none;
        pointer-events: none;
      }

      #clock {
        color: #ddd8c8;
        font-size: 22px;
        letter-spacing: 3px;
        text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
      }

      #fps {
        color: rgba(221, 216, 200, 0.45);
        font-size: 12px;
        letter-spacing: 2px;
        text-shadow: 1px 1px 0 #000;
        display: none;
      }

      .btn {
        pointer-events: all;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #ddd8c8;
        padding: 3px 10px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: background 0.1s;
      }
      .btn:hover { background: rgba(255, 255, 255, 0.12); }
      .btn.off { color: #666; border-color: #333; }

      #journey {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.35);
        font-family: 'Courier New', monospace;
        font-size: 11px;
        letter-spacing: 2px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div id="clock">--:--:--</div>
      <button class="btn" id="clock-btn">CLOCK</button>
      <button class="btn" id="sound-btn">SOUND ♪</button>
      <div id="fps">-- fps</div>
      <button class="btn" id="fps-btn">FPS</button>
    </div>
    <div id="journey">SOURCE</div>
    <div id="whiteout" style="position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
